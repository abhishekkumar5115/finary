# === 1. Backend Service (LoadBalancer) ===
apiVersion: v1
kind: Service
metadata:
  name: finary-backend-service
spec:
  type: LoadBalancer
  selector:
    app: finary-backend
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
---
# === 2. Frontend Service (LoadBalancer) ===
apiVersion: v1
kind: Service
metadata:
  name: finary-frontend-service
spec:
  # This creates a NEW External IP for your frontend
  type: LoadBalancer
  selector:
    app: finary-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443