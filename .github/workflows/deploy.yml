name: Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/finary-backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/finary-frontend:latest
        build-args: |
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_PROD }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      
    - name: Connect to AKS
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
        cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

    - name: Create/Update Kubernetes Secret
      run: |
        kubectl delete secret finary-secrets --ignore-not-found
        kubectl create secret generic finary-secrets \
          --from-literal=POSTGRES_HOST='${{ secrets.POSTGRES_HOST }}' \
          --from-literal=POSTGRES_USER='${{ secrets.POSTGRES_USER }}' \
          --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
          --from-literal=POSTGRES_DB='${{ secrets.POSTGRES_DB }}' \
          --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
          --from-literal=RAZORPAY_KEY_ID='${{ secrets.RAZORPAY_KEY_ID }}' \
          --from-literal=RAZORPAY_KEY_SECRET='${{ secrets.RAZORPAY_KEY_SECRET }}' \
          --from-literal=RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
          --from-literal=PGSSLMODE='require' \
          --from-literal=NODE_ENV='production'

    - name: Deploy YAML files
      run: |
        kubectl apply -f backend-deployment.yaml
        kubectl apply -f frontend-deployment.yaml