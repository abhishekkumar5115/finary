apiVersion: apps/v1
kind: Deployment
metadata:
  name: finary-backend-deployment
  namespace: default
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: finary-backend
  template:
    metadata:
      labels:
        app: finary-backend
    spec:
      containers:
        - name: finary-backend
          image: your-docker-id/finary-backend:latest 
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: / 
              port: 3000
            initialDelaySeconds: 15 
            periodSeconds: 10 
            timeoutSeconds: 5
            
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60 
            periodSeconds: 30
            timeoutSeconds: 5
          envFrom:
            - secretRef:
                name: finary-secrets