apiVersion: apps/v1
kind: Deployment
metadata:
  name: finary-backend-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finary-backend
  template:
    metadata:
      labels:
        app: finary-backend
    spec:
      containers:
        - name: finary-backend
          image: abhishek2803/finary-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: finary-secrets
